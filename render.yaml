services:
  - type: web
    name: myhouse-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://my-house-4rbo.vercel.app,https://my-house-4rbo-9lug4silv-blacking237s-projects.vercel.app
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECONDS
        value: 900
      - key: JWT_REFRESH_SECONDS
        value: 2592000
      - key: RECOVERY_ADMIN_CODE
        sync: false
      - key: RECOVERY_CODE_TTL_MINUTES
        value: 15
      - key: RECOVERY_MAIL_ENABLED
        value: true
      - key: RECOVERY_MAIL_FROM
        value: no-reply@myhouse.app
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SMTP_AUTH
        value: true
      - key: MAIL_SMTP_STARTTLS
        value: true
      - key: RESET_DEFAULT_ADMIN_ON_STARTUP
        value: false
      - key: FLUTTERWAVE_ENABLED
        value: false
      - key: WHATSAPP_ENABLED
        value: false
      - key: SENDGRID_ENABLED
        value: false
      - key: EXPO_PUSH_ENABLED
        value: false
